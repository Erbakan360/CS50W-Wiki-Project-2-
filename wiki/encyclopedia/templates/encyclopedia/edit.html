{% extends "encyclopedia/layout.html" %}

{% block title %}
    {{ entry }}
{% endblock %}

{% block body %}
    <h1> Edit </h1>

    <h2> {{ message }} </h2>

    <form method="post">
        <h1> {{ title }} </h1>
        <textarea autocomplete="off" name="content" id="content">{{ content }}</textarea>
        {% csrf_token %}
        <br>
        <input type="submit" id="save" name="save" value="Save">
    </form>

{% endblock %}
